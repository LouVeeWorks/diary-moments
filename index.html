<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diary Moments</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --terracotta: #c17a5b;
    --terracotta-dark: #a8613f;
    --terracotta-light: #e8c4ad;
    --terracotta-pale: #f5e8de;
    --text-dark: #2c2420;
    --text-mid: #6b5a52;
    --text-light: #a8998f;
    --border: #e2d9cf;
    --shadow: rgba(44, 36, 32, 0.08);
    --shadow-md: rgba(44, 36, 32, 0.14);
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e8ddd2 0%, #f5ede5 40%, #ede5d8 100%);
    position: fixed;
    inset: 0;
    z-index: 99999;
  }
  #auth-screen.hidden { display: none; }
  .auth-card {
    background: white;
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px var(--shadow-md), 0 4px 16px var(--shadow);
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .auth-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
    gap: 10px;
  }
  .auth-logo-icon {
    width: 56px; height: 56px;
    background: var(--terracotta);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(193,122,91,0.35);
  }
  .auth-logo-icon svg { width: 28px; height: 28px; }
  .auth-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--text-dark);
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .auth-logo p {
    font-size: 13px;
    color: var(--text-light);
    letter-spacing: 0.3px;
  }
  .auth-tabs {
    display: flex;
    background: var(--cream);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1;
    padding: 9px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-light);
    transition: all 0.2s;
  }
  .auth-tab.active {
    background: white;
    color: var(--text-dark);
    box-shadow: 0 2px 8px var(--shadow);
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 7px;
  }
  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .input-wrap .icon {
    position: absolute;
    left: 12px;
    color: var(--text-light);
    display: flex;
  }
  .input-wrap input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Lato', sans-serif;
    color: var(--text-dark);
    background: var(--warm-white);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .input-wrap input:focus {
    border-color: var(--terracotta);
    box-shadow: 0 0 0 3px rgba(193,122,91,0.12);
  }
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.3px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(193,122,91,0.3);
  }
  .btn-primary:hover { background: var(--terracotta-dark); box-shadow: 0 6px 18px rgba(193,122,91,0.38); }
  .btn-primary:active { transform: translateY(1px); }
  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-light);
  }
  .auth-footer a {
    color: var(--terracotta);
    text-decoration: none;
    font-weight: 700;
    cursor: pointer;
  }
  .auth-footer a:hover { text-decoration: underline; }
  .auth-error {
    background: #fde8e8;
    color: #b94040;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .auth-error.show { display: block; }

  /* ── APP SCREEN ── */
  #app-screen { display: none; min-height: 100vh; flex-direction: column; position: relative; }
  #app-screen.visible { display: flex; }

  /* Make header and main sit above everything */
  .app-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); box-shadow: 0 2px 12px var(--shadow); }
  .diary-main { position: relative; z-index: 1; padding: 24px 20px; max-width: 1400px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo-icon {
    width: 34px; height: 34px;
    background: var(--terracotta);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-logo-icon svg { width: 18px; height: 18px; }
  .header-logo span {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-dark);
    letter-spacing: -0.2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .save-status {
    font-size: 12px;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .save-status.saved { color: #6aab7a; }
  .icon-btn {
    width: 34px; height: 34px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    color: var(--text-mid);
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--cream); color: var(--text-dark); }
  .user-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--terracotta);
    border: none;
    color: white;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .user-btn:hover { background: var(--terracotta-dark); }

  /* Dropdown — fixed so stacking context never displaces it */
  .dropdown {
    position: fixed;
    top: 60px;
    right: 16px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px var(--shadow-md);
    width: 210px;
    padding: 8px;
    z-index: 9999;
    display: none;
    animation: dropIn 0.15s ease;
  }
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .dropdown.open { display: block; }
  .dropdown-email {
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text-light);
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
    word-break: break-all;
  }
  .dropdown-section-label {
    padding: 6px 10px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-light);
  }
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 10px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-dark);
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'Lato', sans-serif;
    transition: background 0.15s;
  }
  .dropdown-item:hover { background: var(--cream); }
  .dropdown-item.danger { color: #b94040; }
  .dropdown-item.danger:hover { background: #fde8e8; }
  .dropdown-sep { height: 1px; background: var(--border); margin: 6px 0; }

  /* Main diary area */
  .diary-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .nav-arrow {
    width: 38px; height: 38px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mid);
    transition: all 0.15s;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .nav-arrow:hover { border-color: var(--terracotta); color: var(--terracotta); box-shadow: 0 4px 12px rgba(193,122,91,0.2); }
  .nav-week-label {
    font-size: 14px;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ── BOOK PAGE FLIP ── */
  .diary-scene {
    position: relative;
    perspective: 2000px;
    perspective-origin: center 40%;
  }
  .diary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  /* Tablet: stack cards vertically, each full width */
  @media (max-width: 860px) {
    .diary-grid { grid-template-columns: 1fr; gap: 20px; }
    .diary-main { padding: 16px 12px; }
  }
  /* Mobile: tighter padding */
  @media (max-width: 480px) {
    .diary-main { padding: 12px 8px; }
    .app-header { padding: 0 14px; }
  }

  .diary-card {
    background-color: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px var(--shadow);
    overflow: visible;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: box-shadow 0.2s;
  }
  .card-bg-layer {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: white;
    pointer-events: none;
    z-index: 0;
  }
  .card-bg-wash {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: rgba(255,255,255,0.72);
    pointer-events: none;
    z-index: 1;
    transition: background 0.8s ease;
  }
  .diary-card.has-mood-bg .card-bg-wash { background: rgba(255,255,255,0.60); }
  .card-header, .card-body, .card-footer { position: relative; z-index: 2; }
  .mood-picker { z-index: 99999 !important; }
  .diary-card:hover { box-shadow: 0 8px 30px var(--shadow-md); }
  .card-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(226, 217, 207, 0.7);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: transparent;
  }
  .card-date-day {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 3px;
  }
  .card-date-full {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-dark);
  }
  .mood-btn {
    width: 32px; height: 32px;
    border: none;
    background: var(--terracotta-pale);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: transform 0.15s;
    position: relative;
  }
  .mood-btn:hover { transform: scale(1.15); }
  .mood-picker {
    position: fixed;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0;
    display: none;
    flex-direction: column;
    box-shadow: 0 8px 32px var(--shadow-md);
    z-index: 99999;
    width: 232px;
    overflow: hidden;
  }
  .mood-picker.open { display: flex; }
  .mood-picker-scroll {
    max-height: 220px;
    overflow-y: auto;
    padding: 8px 8px 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .mood-picker-scroll::-webkit-scrollbar { width: 4px; }
  .mood-picker-scroll::-webkit-scrollbar-track { background: transparent; }
  .mood-picker-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .mood-category-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-light);
    padding: 6px 4px 3px;
    display: block;
  }
  .mood-category-row {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-bottom: 4px;
  }
  .mood-option {
    font-size: 20px;
    cursor: pointer;
    padding: 4px 5px;
    border-radius: 6px;
    transition: background 0.1s, transform 0.1s;
    border: none;
    background: transparent;
    line-height: 1;
  }
  .mood-option:hover { background: var(--cream); transform: scale(1.2); }
  .mood-picker-footer {
    padding: 6px 8px 8px;
    border-top: 1px solid var(--border);
    background: var(--warm-white);
  }
  .mood-clear-btn {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.5px;
    color: var(--text-mid);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .mood-clear-btn:hover { border-color: #b94040; color: #b94040; background: #fde8e8; }

  .card-body { padding: 0 20px 16px; flex: 1; display: flex; flex-direction: column; gap: 12px; background: rgba(255,255,255,0.0); }
  .diary-textarea {
    width: 100%;
    min-height: 420px;
    resize: none;
    border: none;
    outline: none;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    color: var(--text-dark);
    background: transparent;
    flex: 1;
    /* Ruled lines — line-height must match the gradient repeat */
    line-height: 36px;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 35px,
      rgba(193, 122, 91, 0.18) 35px,
      rgba(193, 122, 91, 0.18) 36px
    );
    background-attachment: local;
    padding-top: 8px;
    padding-left: 4px;
  }
  .diary-textarea::placeholder { color: var(--text-light); font-style: italic; }
  /* Mobile: smaller textarea so it doesn't eat the full screen */
  @media (max-width: 860px) {
    .diary-textarea { min-height: 280px; }
  }
  @media (max-width: 480px) {
    .diary-textarea { min-height: 220px; font-size: 14px; line-height: 34px;
      background-image: repeating-linear-gradient(to bottom, transparent, transparent 33px, rgba(193,122,91,0.18) 33px, rgba(193,122,91,0.18) 34px);
    }
  }

  /* Photo area */
  .photo-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 0;
  }
  .photo-thumb {
    position: relative;
    width: 72px; height: 72px;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-remove {
    position: absolute;
    top: 3px; right: 3px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.5);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid rgba(226, 217, 207, 0.7);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: rgba(255, 255, 255, 0.5);
  }
  .btn-save {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 3px 10px rgba(193,122,91,0.28);
  }
  .btn-save:hover { background: var(--terracotta-dark); }
  .btn-save.saved-anim { background: #6aab7a; }
  .btn-photo {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    background: transparent;
    color: var(--text-mid);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-photo:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .hidden-file { display: none; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-dark);
    color: white;
    padding: 11px 22px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    z-index: 9999;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* user-menu wrapper */
  .user-area { position: relative; }

  /* ── CALENDAR PICKER ── */
  .cal-wrap { position: relative; }
  .cal-icon-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: white;
    cursor: pointer;
    color: var(--text-mid);
    font-size: 13px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    letter-spacing: 0.2px;
    transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px var(--shadow);
    white-space: nowrap;
  }
  .cal-icon-btn:hover { border-color: var(--terracotta); color: var(--terracotta); box-shadow: 0 4px 12px rgba(193,122,91,0.2); }
  .cal-popup {
    display: none;
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 12px 40px var(--shadow-md);
    padding: 20px;
    z-index: 300;
    width: 280px;
    animation: dropIn 0.18s ease;
  }
  .cal-popup.open { display: block; }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-month-label {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-dark);
  }
  .cal-nav {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mid);
    transition: border-color 0.15s, color 0.15s;
  }
  .cal-nav:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-light);
    padding: 4px 0 8px;
  }
  .cal-day {
    text-align: center;
    padding: 6px 2px;
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-dark);
    transition: background 0.12s, color 0.12s;
    border: none;
    background: transparent;
    font-family: 'Lato', sans-serif;
  }
  .cal-day:hover { background: var(--terracotta-pale); color: var(--terracotta-dark); }
  .cal-day.today { font-weight: 700; color: var(--terracotta); }
  .cal-day.selected { background: var(--terracotta); color: white; font-weight: 700; }
  .cal-day.has-entry::after {
    content: '';
    display: block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--terracotta-light);
    margin: 2px auto 0;
  }
  .cal-day.selected::after { background: rgba(255,255,255,0.6); }
  .cal-day.empty { cursor: default; }
  .cal-day.empty:hover { background: transparent; }
  .cal-today-btn {
    width: 100%;
    margin-top: 14px;
    padding: 8px;
    background: var(--cream);
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    color: var(--text-mid);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
  }
  .cal-today-btn:hover { background: var(--terracotta-pale); color: var(--terracotta-dark); }
</style>
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="4"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/>
        </svg>
      </div>
      <h1>Diary Moments</h1>
      <p>Your personal space to capture thoughts</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" id="tab-create" onclick="switchTab('create')">Create Account</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></span>
        <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>
    <div class="form-group" id="confirm-group" style="display:none">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" id="auth-confirm" placeholder="••••••••" autocomplete="new-password" />
      </div>
    </div>
    <button class="btn-primary" id="auth-submit-btn" onclick="handleAuth()">Sign In</button>
    <div class="auth-footer" id="auth-footer-link">
      Don't have an account? <a onclick="switchTab('create')">Sign up</a>
    </div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="app-screen">
  <header class="app-header">
    <div class="header-logo">
      <div class="header-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="4"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/>
        </svg>
      </div>
      <span>Diary Moments</span>
    </div>
    <div class="header-right">
      <div class="save-status saved" id="save-status">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Saved
      </div>
      <div class="user-area">
        <button class="user-btn" id="user-btn" onclick="toggleDropdown()"></button>
        <div class="dropdown" id="user-dropdown">
          <div class="dropdown-email" id="dropdown-email"></div>
          <div class="dropdown-section-label">Download as PDF</div>
          <button class="dropdown-item" onclick="exportDaysPDF()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
            Current 2 Pages — PDF
          </button>
          <button class="dropdown-item" onclick="exportMonthAsPDF()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Full Month — PDF
          </button>
          <div class="dropdown-sep"></div>
          <button class="dropdown-item danger" onclick="signOut()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="diary-main">
    <div class="diary-nav">
      <button class="nav-arrow" onclick="navigate(-2)" title="Previous">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <div class="cal-wrap">
        <button class="cal-icon-btn" onclick="toggleCalendar()" id="cal-trigger">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span id="nav-label"></span>
        </button>
        <div class="cal-popup" id="cal-popup">
          <div class="cal-header">
            <button class="cal-nav" onclick="calShiftMonth(-1)">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="cal-month-label" id="cal-month-label"></span>
            <button class="cal-nav" onclick="calShiftMonth(1)">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
          <button class="cal-today-btn" onclick="jumpToToday()">Jump to Today</button>
        </div>
      </div>

      <button class="nav-arrow" onclick="navigate(2)" title="Next">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="diary-scene">
      <div class="diary-grid" id="diary-grid"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
const STORAGE_KEY = 'diary_moments_data';
const USERS_KEY = 'diary_moments_users';

let currentUser = null;
let currentDayOffset = 0; // offset in days from "today" for the left card
let authMode = 'signin';

// ── UTILITIES ──
function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; }
}
function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
function getUserData(email) {
  try {
    const all = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    return all[email] || {};
  } catch { return {}; }
}
function saveUserData(email, data) {
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  all[email] = data;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}
function dateKey(d) {
  return d.toISOString().split('T')[0]; // YYYY-MM-DD
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function formatDay(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
}
function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

// ── AUTH ──
function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-signin').classList.toggle('active', mode === 'signin');
  document.getElementById('tab-create').classList.toggle('active', mode === 'create');
  document.getElementById('confirm-group').style.display = mode === 'create' ? 'block' : 'none';
  document.getElementById('auth-submit-btn').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-footer-link').innerHTML = mode === 'signin'
    ? `Don't have an account? <a onclick="switchTab('create')">Sign up</a>`
    : `Already have an account? <a onclick="switchTab('signin')">Sign in</a>`;
  document.getElementById('auth-error').classList.remove('show');
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('show');
}

function handleAuth() {
  const email = document.getElementById('auth-email').value.trim().toLowerCase();
  const pass = document.getElementById('auth-password').value;
  const confirm = document.getElementById('auth-confirm').value;
  if (!email || !pass) { showAuthError('Please fill in all fields.'); return; }
  if (!/\S+@\S+\.\S+/.test(email)) { showAuthError('Please enter a valid email address.'); return; }
  const users = getUsers();
  if (authMode === 'create') {
    if (pass.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
    if (pass !== confirm) { showAuthError('Passwords do not match.'); return; }
    if (users[email]) { showAuthError('An account with this email already exists.'); return; }
    users[email] = { email, password: btoa(pass) };
    saveUsers(users);
    loginUser(email);
  } else {
    const u = users[email];
    if (!u || atob(u.password) !== pass) { showAuthError('Invalid email or password.'); return; }
    loginUser(email);
  }
}

// Allow Enter key on auth form — check currentUser state not CSS display
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && currentUser === null) {
    const active = document.activeElement;
    // Only fire if focus is inside the auth card
    if (active && active.closest && active.closest('#auth-screen')) {
      e.preventDefault();
      handleAuth();
    }
  }
});

function loginUser(email) {
  currentUser = email;
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.add('visible');
  document.getElementById('user-btn').textContent = email.charAt(0).toUpperCase();
  document.getElementById('dropdown-email').textContent = email;
  currentDayOffset = 0;
  renderDiary();
}

function signOut() {
  currentUser = null;
  document.getElementById('app-screen').classList.remove('visible');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('user-dropdown').classList.remove('open');
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
  document.getElementById('auth-confirm').value = '';
  document.getElementById('auth-error').classList.remove('show');
  switchTab('signin');
}

// ── DROPDOWN ──
function toggleDropdown() {
  document.getElementById('user-dropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  // Only run when app is visible (user is logged in)
  if (!currentUser) return;
  if (!document.querySelector('.user-area').contains(e.target)) {
    document.getElementById('user-dropdown').classList.remove('open');
  }
});

// ── DIARY RENDERING ──
function getDateForOffset(offset) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return addDays(today, offset);
}

function renderDiary() {
  const grid = document.getElementById('diary-grid');
  grid.innerHTML = '';
  const data = getUserData(currentUser);
  const dates = [getDateForOffset(currentDayOffset), getDateForOffset(currentDayOffset + 1)];
  document.getElementById('nav-label').textContent =
    dates[0].toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  // Reset per-card bg tracking
  cardBgUrls = [null, null];

  dates.forEach((date, i) => {
    const key = dateKey(date);
    const entry = data[key] || { text: '', mood: '', photos: [] };
    const card = buildCard(date, key, entry, i);
    grid.appendChild(card);

    // Restore saved mood background for this card individually
    if (entry.mood && MOOD_BACKGROUNDS[entry.mood]) {
      cardBgUrls[i] = MOOD_BACKGROUNDS[entry.mood];
      setTimeout(() => applyOneCardBackground(i, cardBgUrls[i]), 60);
    }
  });
}

const MOOD_CATEGORIES = [
  { label: 'Happy',     emojis: ['😊','😄','😁','🥰','😍','🤩','😇','🥳','😂','🤣'] },
  { label: 'Sad',       emojis: ['😢','😭','😔','😞','🥺','😿','💔','😟','🫤','😐'] },
  { label: 'Angry',     emojis: ['😤','😠','😡','🤬','👿','💢','😾','🙄','😒','😑'] },
  { label: 'Anxious',   emojis: ['😰','😨','😧','😦','😱','🫣','🥴','😵','😓','😥'] },
  { label: 'Calm',      emojis: ['😌','🧘','😴','💤','🌙','☁️','🍃','🌊','🕊️','✨'] },
  { label: 'Grateful',  emojis: ['🙏','💛','🌸','🌺','🌻','🍀','🫶','💖','🤗','🥹'] },
  { label: 'Energized', emojis: ['💪','🔥','⚡','🚀','🎯','🏆','🎉','🎊','🌟','✌️'] },
  { label: 'Unwell',    emojis: ['🤒','🤧','🤕','🤢','😷','🥵','🥶','💊','🛌','😪'] },
];

// Flat list still used for calendar dot checks
const MOODS = MOOD_CATEGORIES.flatMap(c => c.emojis);

function buildCard(date, key, entry, idx) {
  const card = document.createElement('div');
  card.className = 'diary-card';
  card.innerHTML = `
    <div class="card-bg-layer" id="card-bg-${idx}"></div>
    <div class="card-bg-wash"></div>
    <div class="card-header">
      <div>
        <div class="card-date-day">${formatDay(date)}</div>
        <div class="card-date-full">${formatDate(date)}</div>
      </div>
      <div>
        <button class="mood-btn" id="mood-btn-${idx}" onclick="toggleMoodPicker(${idx}, event)">${entry.mood || '😊'}</button>
      </div>
    </div>
    <div class="card-body">
      <textarea class="diary-textarea" id="textarea-${idx}" placeholder="Write your thoughts here..." data-key="${key}"></textarea>
      <div class="photo-area" id="photos-${idx}"></div>
    </div>
    <div class="card-footer">
      <button class="btn-save" id="save-btn-${idx}" onclick="saveEntry(${idx},'${key}')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Save Entry
      </button>
      <label class="btn-photo">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Add Photo
        <input type="file" accept="image/*" class="hidden-file" onchange="addPhoto(event,${idx},'${key}')" />
      </label>
    </div>`;

  // Build the mood picker as a direct child of body — completely outside card stacking
  let picker = document.getElementById(`mood-picker-${idx}`);
  if (picker) picker.remove(); // remove stale picker from previous render
  picker = document.createElement('div');
  picker.className = 'mood-picker';
  picker.id = `mood-picker-${idx}`;
  picker.innerHTML = `
    <div class="mood-picker-scroll">
      ${MOOD_CATEGORIES.map(cat => `
        <span class="mood-category-label">${cat.label}</span>
        <div class="mood-category-row">
          ${cat.emojis.map(m => `<button class="mood-option" onclick="event.stopPropagation();selectMood(${idx},'${m}','${key}')">${m}</button>`).join('')}
        </div>
      `).join('')}
    </div>
    <div class="mood-picker-footer">
      <button class="mood-clear-btn" onclick="event.stopPropagation();clearMood(${idx},'${key}')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Clear Mood
      </button>
    </div>`;
  document.body.appendChild(picker);

  // Set textarea value directly
  setTimeout(() => {
    const ta = document.getElementById(`textarea-${idx}`);
    if (ta) ta.value = entry.text || '';
    renderPhotos(idx, key, entry.photos || []);
  }, 0);

  // Block drag-and-drop on the card
  card.addEventListener('dragover', e => e.preventDefault());
  card.addEventListener('drop', e => {
    e.preventDefault();
    const files = e.dataTransfer && e.dataTransfer.files;
    if (files && files.length > 0 && files[0].type.startsWith('image/')) {
      addPhoto({ target: { files, value: '' } }, idx, key);
    }
  });

  return card;
}

// Also block drag-drop on the page body so nothing escapes to the document
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());

function renderPhotos(idx, key, photos) {
  const area = document.getElementById(`photos-${idx}`);
  if (!area) return;
  area.innerHTML = '';
  photos.forEach((src, pi) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb';
    wrap.innerHTML = `<img src="${src}" alt="photo" /><button class="photo-remove" onclick="removePhoto(${idx},'${key}',${pi})">×</button>`;
    area.appendChild(wrap);
  });
}

function toggleMoodPicker(idx, event) {
  event.stopPropagation();
  const picker = document.getElementById(`mood-picker-${idx}`);
  const btn    = document.getElementById(`mood-btn-${idx}`);

  // Close the other picker
  const otherId = idx === 0 ? 1 : 0;
  const other = document.getElementById(`mood-picker-${otherId}`);
  if (other) other.classList.remove('open');

  if (picker.classList.contains('open')) {
    picker.classList.remove('open');
    return;
  }

  // Position picker fixed, just below the button
  const rect = btn.getBoundingClientRect();
  picker.style.top  = (rect.bottom + 6) + 'px';
  // Align right edge of picker to right edge of button, clamp to viewport
  let left = rect.right - 232;
  if (left < 8) left = 8;
  picker.style.left = left + 'px';

  picker.classList.add('open');
}

// Stop clicks inside the picker from bubbling to document (which would close it)
document.addEventListener('click', e => {
  if (!currentUser) return;
  [0, 1].forEach(i => {
    const btn    = document.getElementById(`mood-btn-${i}`);
    const picker = document.getElementById(`mood-picker-${i}`);
    if (!picker) return;
    if ((!btn || !btn.contains(e.target)) && !picker.contains(e.target)) {
      picker.classList.remove('open');
    }
  });
});

// ── MOOD BACKGROUNDS ──
// 40 Unsplash photos mapped across 80 emojis (5 unique images × 8 categories)
const MOOD_BACKGROUNDS = {
  // Happy — sunshine, celebrations, golden warmth
  '😊': 'https://images.unsplash.com/photo-1490750967868-88df5691cc86?w=1600&q=80',
  '😄': 'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=1600&q=80',
  '😁': 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1600&q=80',
  '🥰': 'https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=1600&q=80',
  '😍': 'https://images.unsplash.com/photo-1464820453369-31d2c0b651af?w=1600&q=80',
  '🤩': 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1600&q=80',
  '😇': 'https://images.unsplash.com/photo-1490750967868-88df5691cc86?w=1600&q=80',
  '🥳': 'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=1600&q=80',
  '😂': 'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=1600&q=80',
  '🤣': 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1600&q=80',
  // Sad — rain, mist, solitude
  '😢': 'https://images.unsplash.com/photo-1501691223387-dd0500403074?w=1600&q=80',
  '😭': 'https://images.unsplash.com/photo-1504608524841-42584120d693?w=1600&q=80',
  '😔': 'https://images.unsplash.com/photo-1444080748397-f442aa95c3e5?w=1600&q=80',
  '😞': 'https://images.unsplash.com/photo-1520637836862-4d197d17c93a?w=1600&q=80',
  '🥺': 'https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=1600&q=80',
  '😿': 'https://images.unsplash.com/photo-1501691223387-dd0500403074?w=1600&q=80',
  '💔': 'https://images.unsplash.com/photo-1504608524841-42584120d693?w=1600&q=80',
  '😟': 'https://images.unsplash.com/photo-1444080748397-f442aa95c3e5?w=1600&q=80',
  '🫤': 'https://images.unsplash.com/photo-1520637836862-4d197d17c93a?w=1600&q=80',
  '😐': 'https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=1600&q=80',
  // Angry — storms, fire, dramatic skies
  '😤': 'https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=1600&q=80',
  '😠': 'https://images.unsplash.com/photo-1563089145-599997674d42?w=1600&q=80',

let cardBgUrls = [null, null]; // one bg url per card slot

function setCardBackground(idx, emoji) {
  const url = MOOD_BACKGROUNDS[emoji] || null;
  cardBgUrls[idx] = url;
  applyOneCardBackground(idx, url);
}

function applyOneCardBackground(idx, url) {
  const card = document.querySelectorAll('.diary-card')[idx];
  const layer = document.getElementById(`card-bg-${idx}`);
  if (!card || !layer) return;

  card.style.transition = 'opacity 0.35s ease';
  card.style.opacity = '0.4';
  setTimeout(() => {
    if (url) {
      layer.style.backgroundImage = `url('${url}')`;
      card.classList.add('has-mood-bg');
    } else {
      layer.style.backgroundImage = '';
      card.classList.remove('has-mood-bg');
    }
    card.style.opacity = '1';
    setTimeout(() => { card.style.transition = ''; }, 400);
  }, 360);
}

function clearCardBackground(idx) {
  cardBgUrls[idx] = null;
  applyOneCardBackground(idx, null);
}

function selectMood(idx, mood, key) {
  const data = getUserData(currentUser);
  if (!data[key]) data[key] = { text: '', mood, photos: [] };
  data[key].mood = mood;
  saveUserData(currentUser, data);
  document.getElementById(`mood-btn-${idx}`).textContent = mood;
  document.getElementById(`mood-picker-${idx}`).classList.remove('open');
  setCardBackground(idx, mood);
  showSaved();
}

function clearMood(idx, key) {
  const data = getUserData(currentUser);
  if (data[key]) data[key].mood = '';
  saveUserData(currentUser, data);
  document.getElementById(`mood-btn-${idx}`).textContent = '🙂';
  document.getElementById(`mood-picker-${idx}`).classList.remove('open');
  clearCardBackground(idx);
  showToast('Mood cleared.');
}

function saveEntry(idx, key) {
  const text = document.getElementById(`textarea-${idx}`).value;
  const data = getUserData(currentUser);
  if (!data[key]) data[key] = { text: '', mood: '😊', photos: [] };
  data[key].text = text;
  saveUserData(currentUser, data);
  const btn = document.getElementById(`save-btn-${idx}`);
  btn.classList.add('saved-anim');
  btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Saved!`;
  setTimeout(() => {
    btn.classList.remove('saved-anim');
    btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Save Entry`;
  }, 1800);
  showSaved();
}

function addPhoto(e, idx, key) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const data = getUserData(currentUser);
    if (!data[key]) data[key] = { text: '', mood: '😊', photos: [] };
    data[key].photos = data[key].photos || [];
    data[key].photos.push(ev.target.result);
    saveUserData(currentUser, data);
    renderPhotos(idx, key, data[key].photos);
    showSaved();
    showToast('Photo added!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removePhoto(idx, key, pi) {
  const data = getUserData(currentUser);
  if (data[key] && data[key].photos) {
    data[key].photos.splice(pi, 1);
    saveUserData(currentUser, data);
    renderPhotos(idx, key, data[key].photos);
    showToast('Photo removed.');
  }
}

// ── CALENDAR PICKER ──
let calViewYear = null;
let calViewMonth = null;

function toggleCalendar() {
  const popup = document.getElementById('cal-popup');
  if (popup.classList.contains('open')) {
    popup.classList.remove('open');
    return;
  }
  // Initialise view to the currently displayed left-card date
  const current = getDateForOffset(currentDayOffset);
  calViewYear = current.getFullYear();
  calViewMonth = current.getMonth();
  renderCalendar();
  popup.classList.add('open');
}

document.addEventListener('click', e => {
  if (!currentUser) return;
  const wrap = document.querySelector('.cal-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('cal-popup').classList.remove('open');
  }
});

function calShiftMonth(delta) {
  calViewMonth += delta;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  renderCalendar();
}

function renderCalendar() {
  const data = getUserData(currentUser);
  const today = new Date(); today.setHours(0,0,0,0);
  const selectedDate = getDateForOffset(currentDayOffset);

  // Month label
  const labelDate = new Date(calViewYear, calViewMonth, 1);
  document.getElementById('cal-month-label').textContent =
    labelDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day-of-week headers
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  // Blank cells before first day
  const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  // Day cells
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const cellDate = new Date(calViewYear, calViewMonth, d);
    const key = dateKey(cellDate);
    const btn = document.createElement('button');
    btn.className = 'cal-day';
    btn.textContent = d;

    if (cellDate.getTime() === today.getTime()) btn.classList.add('today');
    if (cellDate.getTime() === selectedDate.getTime()) btn.classList.add('selected');
    if (data[key] && (data[key].text || (data[key].photos && data[key].photos.length))) {
      btn.classList.add('has-entry');
    }

    btn.addEventListener('click', () => jumpToDate(cellDate));
    grid.appendChild(btn);
  }
}

function jumpToToday() {
  currentDayOffset = 0;
  document.getElementById('cal-popup').classList.remove('open');
  renderDiary();
}

// ── BOOK PAGE FLIP ENGINE ──
// Clean approach: animate the card OUT (rotateY to 90°, pivot on leaving edge),
// swap content while it is edge-on and invisible, then animate IN from 90° to 0°
// pivoting on the entering edge. Uses CSS transitions only — no DOM restructuring.
let curlAnimating = false;

function runPageCurl(direction, onMidpoint) {
  if (curlAnimating) return;
  curlAnimating = true;

  const fwd = direction === 'fwd';
  const SWEEP  = 420; // ms to rotate from flat to edge-on
  const SETTLE = 420; // ms to rotate from edge-on to flat (new page)
  const STAGGER = 90; // ms between card 0 and card 1

  const cards = Array.from(document.querySelectorAll('.diary-card'));
  if (!cards.length) { curlAnimating = false; onMidpoint(); return; }

  let midpointFired = false;

  cards.forEach((card, i) => {
    const delay = i * STAGGER;

    // ── PHASE 1: sweep current page away to edge-on ──
    setTimeout(() => {
      card.style.transition = `transform ${SWEEP}ms cubic-bezier(0.55, 0, 1, 0.45),
                               box-shadow ${SWEEP}ms ease`;
      card.style.transformOrigin = fwd ? 'left center' : 'right center';
      card.style.transform  = fwd ? 'rotateY(90deg)' : 'rotateY(-90deg)';
      card.style.boxShadow  = fwd
        ? '-6px 0 20px rgba(20,12,8,0.20)'
        : '6px 0 20px rgba(20,12,8,0.20)';
    }, delay);

    // ── MIDPOINT: card is invisible — swap content, flip to opposite side ──
    setTimeout(() => {
      if (!midpointFired) {
        midpointFired = true;
        onMidpoint(); // renderDiary() rebuilds all cards fresh
      }
      // After renderDiary the old card reference is gone; get the new one
      const newCard = document.querySelectorAll('.diary-card')[i];
      if (!newCard) return;

      // Start from the opposite edge-on position (entering edge)
      newCard.style.transition = 'none';
      newCard.style.transformOrigin = fwd ? 'right center' : 'left center';
      newCard.style.transform  = fwd ? 'rotateY(-90deg)' : 'rotateY(90deg)';
      newCard.style.boxShadow  = fwd
        ? '6px 0 20px rgba(20,12,8,0.20)'
        : '-6px 0 20px rgba(20,12,8,0.20)';

      // ── PHASE 2: swing new page into view ──
      requestAnimationFrame(() => requestAnimationFrame(() => {
        newCard.style.transition = `transform ${SETTLE}ms cubic-bezier(0, 0.55, 0.45, 1),
                                    box-shadow ${SETTLE}ms ease`;
        newCard.style.transform  = 'rotateY(0deg)';
        newCard.style.boxShadow  = '0 4px 20px rgba(44,36,32,0.08)';
      }));

      // ── CLEANUP ──
      setTimeout(() => {
        newCard.style.transition      = '';
        newCard.style.transform       = '';
        newCard.style.transformOrigin = '';
        newCard.style.boxShadow       = '';
        if (i === cards.length - 1) curlAnimating = false;
      }, SETTLE + 40);

    }, delay + SWEEP);
  });
}

function navigate(delta) {
  if (curlAnimating) return;
  const direction = delta > 0 ? 'fwd' : 'bwd';
  runPageCurl(direction, () => {
    currentDayOffset += delta;
    renderDiary();
  });
}

function jumpToDate(date) {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((date - today) / (1000 * 60 * 60 * 24));
  const direction = diff >= currentDayOffset ? 'fwd' : 'bwd';
  document.getElementById('cal-popup').classList.remove('open');
  if (curlAnimating) return;
  runPageCurl(direction, () => {
    currentDayOffset = diff;
    renderDiary();
  });
}

function showSaved() {
  const el = document.getElementById('save-status');
  el.className = 'save-status saved';
  el.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Saved`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── PDF EXPORT (direct download via jsPDF) ──
function loadJsPDF(callback) {
  if (window.jspdf) { callback(); return; }
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  script.onload = callback;
  document.head.appendChild(script);
}

function buildPDF(title, entries) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const pageW  = doc.internal.pageSize.getWidth();
  const pageH  = doc.internal.pageSize.getHeight();
  const margin = 54;
  const contentW = pageW - margin * 2;
  const terracotta = [193, 122, 91];
  const darkText   = [44,  36,  32];
  const midText    = [107, 90,  82];
  const lightText  = [168, 153, 143];
  const borderCol  = [226, 217, 207];

  // ── Cover page ──
  // Background wash
  doc.setFillColor(245, 240, 232);
  doc.rect(0, 0, pageW, pageH, 'F');

  // Logo box
  doc.setFillColor(...terracotta);
  doc.roundedRect(pageW/2 - 28, 140, 56, 56, 8, 8, 'F');

  // Lines icon inside box
  doc.setDrawColor(255, 255, 255);
  doc.setLineWidth(2);
  [[0,12],[0,20],[0,28]].forEach(([,y]) => {
    doc.line(pageW/2 - 14, 140 + y + 10, pageW/2 + 14, 140 + y + 10);
  });

  // Title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(30);
  doc.setTextColor(...darkText);
  doc.text('Diary Moments', pageW / 2, 240, { align: 'center' });

  // Subtitle
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(12);
  doc.setTextColor(...midText);
  doc.text(title, pageW / 2, 265, { align: 'center' });

  // User + date
  doc.setFontSize(10);
  doc.setTextColor(...lightText);
  doc.text(currentUser, pageW / 2, 288, { align: 'center' });
  doc.text(new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }), pageW / 2, 304, { align: 'center' });

  // Decorative line
  doc.setDrawColor(...terracotta);
  doc.setLineWidth(1);
  doc.line(margin + 60, 322, pageW - margin - 60, 322);

  // ── Entry pages ──
  entries.forEach(({ date, entry }) => {
    doc.addPage();
    const e = entry || {};
    let y = margin;

    // Page background
    doc.setFillColor(255, 255, 255);
    doc.rect(0, 0, pageW, pageH, 'F');

    // Top accent bar
    doc.setFillColor(...terracotta);
    doc.rect(0, 0, pageW, 4, 'F');

    // Day label
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(...lightText);
    doc.text(formatDay(date).toUpperCase(), margin, y + 20);

    // Full date
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.setTextColor(...darkText);
    doc.text(formatDate(date), margin, y + 44);

    // Mood emoji — rendered via canvas to PNG so it shows correctly in PDF
    if (e.mood) {
      try {
        const emojiSize = 40;
        const c = document.createElement('canvas');
        c.width  = emojiSize * 2; // 2x for sharpness
        c.height = emojiSize * 2;
        const cx = c.getContext('2d');
        cx.clearRect(0, 0, c.width, c.height);
        cx.font = `${emojiSize * 1.5}px serif`;
        cx.textBaseline = 'middle';
        cx.textAlign = 'center';
        cx.fillText(e.mood, c.width / 2, c.height / 2);
        const imgData = c.toDataURL('image/png');
        // Place in upper right, same vertical position as the date
        doc.addImage(imgData, 'PNG', pageW - margin - emojiSize, y + 10, emojiSize, emojiSize);
      } catch(err) {
        // Fallback: skip emoji silently if canvas fails
      }
    }

    // Divider
    y += 58;
    doc.setDrawColor(...borderCol);
    doc.setLineWidth(0.5);
    doc.line(margin, y, pageW - margin, y);
    y += 20;

    // Ruled lines + text
    const lineH    = 24;
    const textTop  = y;
    const textArea = pageH - margin - textTop - 60;
    const numLines = Math.floor(textArea / lineH);

    // Draw ruled lines
    doc.setDrawColor(...borderCol);
    doc.setLineWidth(0.4);
    for (let i = 0; i < numLines; i++) {
      const ly = textTop + i * lineH + lineH;
      doc.line(margin, ly, pageW - margin, ly);
    }

    // Entry text over the lines
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(12);
    doc.setTextColor(...darkText);
    const rawText  = e.text || '';
    if (rawText.trim()) {
      const wrapped = doc.splitTextToSize(rawText, contentW);
      wrapped.forEach((line, li) => {
        const ty = textTop + li * lineH + lineH - 5;
        if (ty < pageH - margin - 40) {
          doc.text(line, margin, ty);
        }
      });
    } else {
      doc.setTextColor(...lightText);
      doc.setFont('helvetica', 'italic');
      doc.text('No entry for this day.', margin, textTop + lineH - 5);
    }

    // Page number footer
    doc.setFontSize(8);
    doc.setTextColor(...lightText);
    doc.setFont('helvetica', 'normal');
    doc.text(`${formatDay(date)}, ${formatDate(date)}`, pageW / 2, pageH - 24, { align: 'center' });

    // ── Photos: embed actual images on a new page after the entry ──
    if (e.photos && e.photos.length) {
      doc.addPage();

      // Top accent bar
      doc.setFillColor(...terracotta);
      doc.rect(0, 0, pageW, 4, 'F');

      // Photos header
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...lightText);
      doc.text(formatDay(date).toUpperCase(), margin, 30);
      doc.setFontSize(16);
      doc.setTextColor(...darkText);
      doc.text(`${formatDate(date)}  —  Photos`, margin, 52);

      // Divider
      doc.setDrawColor(...borderCol);
      doc.setLineWidth(0.5);
      doc.line(margin, 62, pageW - margin, 62);

      // Lay out photos in a grid: 2 columns
      const cols      = 2;
      const imgGap    = 14;
      const imgW      = (contentW - imgGap) / cols;
      const imgH      = imgW * 0.68; // landscape aspect
      const startY    = 76;
      let photoY      = startY;
      let col         = 0;

      e.photos.forEach((src, pi) => {
        try {
          const x = margin + col * (imgW + imgGap);

          // Detect format from data URL header
          let fmt = 'JPEG';
          if (src.startsWith('data:image/png'))  fmt = 'PNG';
          if (src.startsWith('data:image/webp')) fmt = 'WEBP';

          doc.addImage(src, fmt, x, photoY, imgW, imgH);

          // Thin border around photo
          doc.setDrawColor(...borderCol);
          doc.setLineWidth(0.4);
          doc.rect(x, photoY, imgW, imgH);

          col++;
          if (col >= cols) {
            col = 0;
            photoY += imgH + imgGap;
            // If we're running out of space, add another page
            if (photoY + imgH > pageH - margin) {
              doc.addPage();
              doc.setFillColor(...terracotta);
              doc.rect(0, 0, pageW, 4, 'F');
              photoY = 24;
              col = 0;
            }
          }
        } catch (err) {
          // Skip any photo that fails to embed
        }
      });

      // Page footer
      doc.setFontSize(8);
      doc.setTextColor(...lightText);
      doc.setFont('helvetica', 'normal');
      doc.text(`${formatDay(date)}, ${formatDate(date)}  —  Photos`, pageW / 2, pageH - 24, { align: 'center' });
    }

  }); // end entries.forEach

  return doc;
}

function exportDaysPDF() {
  document.getElementById('user-dropdown').classList.remove('open');
  showToast('Building PDF…');
  loadJsPDF(() => {
    const data = getUserData(currentUser);
    const d1   = getDateForOffset(currentDayOffset);
    const d2   = getDateForOffset(currentDayOffset + 1);
    const entries = [
      { date: d1, entry: data[dateKey(d1)] },
      { date: d2, entry: data[dateKey(d2)] },
    ];
    const label = `${formatDate(d1)} & ${formatDate(d2)}`;
    const doc = buildPDF(label, entries);
    doc.save(`diary-${dateKey(d1)}.pdf`);
    showToast('PDF downloaded!');
  });
}

function exportMonthAsPDF() {
  document.getElementById('user-dropdown').classList.remove('open');
  showToast('Building PDF…');
  loadJsPDF(() => {
    const data      = getUserData(currentUser);
    const today     = new Date(); today.setHours(0,0,0,0);
    const year      = today.getFullYear();
    const month     = today.getMonth();
    const monthName = today.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    const days      = new Date(year, month + 1, 0).getDate();
    const entries   = [];
    for (let d = 1; d <= days; d++) {
      const date  = new Date(year, month, d);
      const entry = data[dateKey(date)];
      if (entry && (entry.text || (entry.photos && entry.photos.length))) {
        entries.push({ date, entry });
      }
    }
    if (entries.length === 0) {
      showToast('No entries this month to export.');
      return;
    }
    const doc = buildPDF(`${monthName} — Full Month`, entries);
    doc.save(`diary-${monthName.replace(' ', '-')}.pdf`);
    showToast('PDF downloaded!');
  });
}
